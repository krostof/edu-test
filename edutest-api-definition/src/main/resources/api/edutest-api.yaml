openapi: 3.0.3
info:
  title: EduTest API
  description: API for online testing platform
  version: 1.0.0
  contact:
    name: EduTest Team
    email: contact@edutest.com

servers:
  - url: http://localhost:8080/api/v1
    description: Development server
  - url: https://api.edutest.com/v1
    description: Production server

tags:
  - name: Authentication
    description: User authentication and authorization
  - name: Users
    description: User profile operations
  - name: Admin
    description: Administrative operations (admin only)
  - name: Groups
    description: Student group management
  - name: Tests
    description: Test management and execution
  - name: Assignments
    description: Assignment management within tests

paths:
  # Authentication Endpoints
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and return JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh JWT token
      description: Refresh expired JWT token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid refresh token

  # User Profile Endpoints
  /users/profile:
    get:
      tags:
        - Users
      summary: Get current user profile
      description: Get profile information for authenticated user
      operationId: getCurrentUserProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Unauthorized

    put:
      tags:
        - Users
      summary: Update current user profile
      description: Update profile information for authenticated user
      operationId: updateCurrentUserProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized

  # Admin - User Management Endpoints
  /admin/users:
    get:
      tags:
        - Admin
      summary: Get all users
      description: Get paginated list of users (admin only)
      operationId: getAllUsers
      security:
        - BearerAuth: []
      parameters:
        - name: role
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/UserRole'
          description: Filter by user role
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 1000
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by username, email, firstName or lastName
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResponse'
        '403':
          description: Access denied - admin role required

  /admin/users/{userId}:
    get:
      tags:
        - Admin
      summary: Get user by ID
      description: Get user information by ID (admin only)
      operationId: getUserById
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: User not found
        '403':
          description: Access denied - admin role required

    put:
      tags:
        - Admin
      summary: Update user
      description: Update user information (admin only)
      operationId: updateUser
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: User not found
        '403':
          description: Access denied - admin role required

    delete:
      tags:
        - Admin
      summary: Delete user
      description: Delete user account (admin only)
      operationId: deleteUser
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: User deleted successfully
        '404':
          description: User not found
        '403':
          description: Access denied - admin role required

  /admin/students:
    post:
      tags:
        - Admin
      summary: Create student account
      description: Create new student account (admin only)
      operationId: createStudent
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudentRequest'
      responses:
        '201':
          description: Student created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Invalid input data
        '409':
          description: Username or email already exists
        '403':
          description: Access denied - admin role required

  /admin/teachers:
    post:
      tags:
        - Admin
      summary: Create teacher account
      description: Create new teacher account (admin only)
      operationId: createTeacher
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeacherRequest'
      responses:
        '201':
          description: Teacher created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: Invalid input data
        '409':
          description: Username or email already exists
        '403':
          description: Access denied - admin role required

  /admin/users/{userId}/activate:
    patch:
      tags:
        - Admin
      summary: Activate user account
      description: Activate user account (admin only)
      operationId: activateUser
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User activated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: User not found
        '403':
          description: Access denied - admin role required

  /admin/users/{userId}/deactivate:
    patch:
      tags:
        - Admin
      summary: Deactivate user account
      description: Deactivate user account (admin only)
      operationId: deactivateUser
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User deactivated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: User not found
        '403':
          description: Access denied - admin role required

  /admin/users/batch-deactivate:
    post:
      tags:
        - Admin
      summary: Batch deactivate users
      description: Deactivate multiple user accounts at once (admin only)
      operationId: batchDeactivateUsers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchUserIdsRequest'
      responses:
        '200':
          description: Batch deactivation completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationResponse'
        '403':
          description: Access denied - admin role required

  /admin/users/batch-delete:
    delete:
      tags:
        - Admin
      summary: Batch delete users
      description: Delete multiple user accounts at once (admin only)
      operationId: batchDeleteUsers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchUserIdsRequest'
      responses:
        '200':
          description: Batch deletion completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchOperationResponse'
        '403':
          description: Access denied - admin role required

  # Group Management Endpoints
  /groups:
    get:
      tags:
        - Groups
      summary: Get groups
      description: Get groups for current user (teacher gets their groups, student gets their group)
      operationId: getGroups
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Groups retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentGroup'

    post:
      tags:
        - Groups
      summary: Create new group
      description: Create new student group (admin only). Only administrators can create groups.
      operationId: createGroup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Group created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentGroup'
        '403':
          description: Access denied - admin role required

  /groups/{groupId}:
    get:
      tags:
        - Groups
      summary: Get group by ID
      description: Get group details and members
      operationId: getGroupById
      security:
        - BearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Group retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentGroupDetails'
        '404':
          description: Group not found

    put:
      tags:
        - Groups
      summary: Update group
      description: Update group information (teacher only)
      operationId: updateGroup
      security:
        - BearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: Group updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentGroup'
        '404':
          description: Group not found
        '403':
          description: Access denied

    delete:
      tags:
        - Groups
      summary: Delete group
      description: Delete a student group (admin only)
      operationId: deleteGroup
      security:
        - BearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Group deleted successfully
        '404':
          description: Group not found
        '403':
          description: Access denied - admin role required

  /groups/{groupId}/students:
    post:
      tags:
        - Groups
      summary: Add student to group
      description: Add student to group (admin only). Student can only be in one group at a time.
      operationId: addStudentToGroup
      security:
        - BearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddStudentRequest'
      responses:
        '200':
          description: Student added to group successfully
        '404':
          description: Group or student not found
        '409':
          description: Student is already in another group
        '403':
          description: Access denied - admin role required

  /groups/{groupId}/students/{studentId}:
    delete:
      tags:
        - Groups
      summary: Remove student from group
      description: Remove a student from a group (admin only)
      operationId: removeStudentFromGroup
      security:
        - BearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Student removed from group successfully
        '404':
          description: Group or student not found
        '403':
          description: Access denied - admin role required

  /groups/{groupId}/students/batch:
    post:
      tags:
        - Groups
      summary: Add multiple students to group
      description: Add multiple students to group at once (admin only). Students can only be in one group at a time.
      operationId: addStudentsToGroup
      security:
        - BearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddStudentsRequest'
      responses:
        '200':
          description: Students added to group successfully
        '404':
          description: Group or student not found
        '409':
          description: One or more students are already in another group
        '403':
          description: Access denied - admin role required

  /groups/{groupId}/teachers:
    post:
      tags:
        - Groups
      summary: Add teacher to group
      description: Add a teacher to group (admin only)
      operationId: addTeacherToGroup
      security:
        - BearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTeacherRequest'
      responses:
        '200':
          description: Teacher added to group successfully
        '404':
          description: Group or teacher not found
        '403':
          description: Access denied - admin role required

  /groups/{groupId}/teachers/{teacherId}:
    delete:
      tags:
        - Groups
      summary: Remove teacher from group
      description: Remove a teacher from a group (admin only)
      operationId: removeTeacherFromGroup
      security:
        - BearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: teacherId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Teacher removed from group successfully
        '404':
          description: Group or teacher not found
        '403':
          description: Access denied - admin role required

  # Test Management Endpoints
  /tests:
    get:
      tags:
        - Tests
      summary: Get tests
      description: Get tests for current user
      operationId: getTests
      security:
        - BearerAuth: []
      parameters:
        - name: groupId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Filter by group ID
      responses:
        '200':
          description: Tests retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Test'

    post:
      tags:
        - Tests
      summary: Create new test
      description: Create new test (teacher only)
      operationId: createTest
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTestRequest'
      responses:
        '201':
          description: Test created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Test'
        '403':
          description: Access denied - teacher role required

  /tests/{testId}:
    get:
      tags:
        - Tests
      summary: Get test by ID
      description: Get test details
      operationId: getTestById
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Test retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestDetails'
        '404':
          description: Test not found

    put:
      tags:
        - Tests
      summary: Update test
      description: Update test information (teacher only)
      operationId: updateTest
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTestRequest'
      responses:
        '200':
          description: Test updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Test'
        '404':
          description: Test not found
        '403':
          description: Access denied

    delete:
      tags:
        - Tests
      summary: Delete test
      description: Delete test (teacher only)
      operationId: deleteTest
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Test deleted successfully
        '404':
          description: Test not found
        '409':
          description: Cannot delete test with existing attempts
        '403':
          description: Access denied

  /tests/{testId}/start:
    post:
      tags:
        - Tests
      summary: Start test attempt
      description: Start new test attempt for student
      operationId: startTestAttempt
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: Test attempt started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestAttempt'
        '409':
          description: Test attempt already exists or test not available

  # Assignment Management Endpoints
  /tests/{testId}/assignments:
    get:
      tags:
        - Assignments
      summary: Get assignments for test
      description: Get all assignments for a specific test
      operationId: getAssignments
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Assignments retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssignmentResponse'
        '404':
          description: Test not found

    post:
      tags:
        - Assignments
      summary: Create assignment
      description: Create new assignment in test (teacher only)
      operationId: createAssignment
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssignmentRequest'
      responses:
        '201':
          description: Assignment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '400':
          description: Invalid input data
        '404':
          description: Test not found
        '403':
          description: Access denied

  /tests/{testId}/assignments/{assignmentId}:
    get:
      tags:
        - Assignments
      summary: Get assignment by ID
      description: Get assignment details
      operationId: getAssignment
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Assignment retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '404':
          description: Assignment not found

    put:
      tags:
        - Assignments
      summary: Update assignment
      description: Update assignment information (teacher only)
      operationId: updateAssignment
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssignmentRequest'
      responses:
        '200':
          description: Assignment updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '404':
          description: Assignment not found
        '403':
          description: Access denied

    delete:
      tags:
        - Assignments
      summary: Delete assignment
      description: Delete assignment from test (teacher only)
      operationId: deleteAssignment
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Assignment deleted successfully
        '404':
          description: Assignment not found
        '403':
          description: Access denied

  /tests/{testId}/assignments/{assignmentId}/move:
    patch:
      tags:
        - Assignments
      summary: Move assignment
      description: Change assignment order within test (teacher only)
      operationId: moveAssignment
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveAssignmentRequest'
      responses:
        '200':
          description: Assignment moved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '404':
          description: Assignment not found
        '403':
          description: Access denied

  /tests/{testId}/assignments/{assignmentId}/duplicate:
    post:
      tags:
        - Assignments
      summary: Duplicate assignment
      description: Create a copy of an existing assignment (teacher only)
      operationId: duplicateAssignment
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: Assignment duplicated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '404':
          description: Assignment not found
        '403':
          description: Access denied

  # Test Group Management Endpoints
  /tests/{testId}/groups:
    get:
      tags:
        - Tests
      summary: Get test groups
      description: Get groups assigned to test
      operationId: getTestGroups
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Groups retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TestGroupResponse'
        '404':
          description: Test not found

    post:
      tags:
        - Tests
      summary: Assign group to test
      description: Assign a student group to test (teacher only)
      operationId: assignGroupToTest
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignGroupRequest'
      responses:
        '200':
          description: Group assigned successfully
        '404':
          description: Test or group not found
        '409':
          description: Group already assigned to test
        '403':
          description: Access denied

  /tests/{testId}/groups/{groupId}:
    delete:
      tags:
        - Tests
      summary: Remove group from test
      description: Remove a student group from test (teacher only)
      operationId: removeGroupFromTest
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Group removed successfully
        '404':
          description: Test or group not found
        '403':
          description: Access denied

  # Test Attempt Answer Endpoints
  /tests/{testId}/attempts/{attemptId}/answers:
    get:
      tags:
        - Tests
      summary: Get all answers for test attempt
      description: Get all submitted answers for the current test attempt (student only)
      operationId: getAllAnswers
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: attemptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Answers retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AnswerResponse'
        '403':
          description: Access denied - not your attempt
        '404':
          description: Test attempt not found

  /tests/{testId}/attempts/{attemptId}/answers/{assignmentId}:
    get:
      tags:
        - Tests
      summary: Get answer for specific assignment
      description: Get the submitted answer for a specific assignment in the test attempt
      operationId: getAnswer
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: attemptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Answer retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerResponse'
        '403':
          description: Access denied - not your attempt
        '404':
          description: Answer not found

    post:
      tags:
        - Tests
      summary: Submit answer for assignment
      description: Submit or update answer for a specific assignment during test attempt
      operationId: submitAnswer
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: attemptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswerRequest'
      responses:
        '200':
          description: Answer submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnswerResponse'
        '400':
          description: Invalid answer data
        '403':
          description: Access denied - not your attempt
        '404':
          description: Test attempt or assignment not found
        '409':
          description: Test attempt already completed or time expired

  /tests/{testId}/attempts/{attemptId}/submit:
    post:
      tags:
        - Tests
      summary: Submit test attempt
      description: Finish and submit the test attempt for grading
      operationId: submitTestAttempt
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: attemptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Test submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestSubmissionResult'
        '403':
          description: Access denied - not your attempt
        '404':
          description: Test attempt not found
        '409':
          description: Test attempt already completed

  /tests/{testId}/attempts/{attemptId}/results:
    get:
      tags:
        - Tests
      summary: Get test results
      description: Get detailed results for a completed test attempt
      operationId: getTestResults
      security:
        - BearerAuth: []
      parameters:
        - name: testId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: attemptId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Results retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResultResponse'
        '403':
          description: Access denied - test not completed or not your attempt
        '404':
          description: Test attempt not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Authentication Schemas
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 6
          maxLength: 100

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: "Bearer"
        expiresIn:
          type: integer
          format: int64
        user:
          $ref: '#/components/schemas/UserProfile'

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string

    # User Schemas
    UserProfile:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        isActive:
          type: boolean
        groupId:
          type: integer
          format: int64
          description: ID of the student's group (only for students)
        groupName:
          type: string
          description: Name of the student's group (only for students)
        createdAt:
          type: string
          format: date-time

    # User Profile and Admin Schemas
    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          minLength: 2
          maxLength: 50
        lastName:
          type: string
          minLength: 2
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 100

    UpdateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 100
        firstName:
          type: string
          minLength: 2
          maxLength: 50
        lastName:
          type: string
          minLength: 2
          maxLength: 50
        isActive:
          type: boolean
        role:
          $ref: '#/components/schemas/UserRole'

    CreateStudentRequest:
      type: object
      required:
        - email
        - firstName
        - lastName
        - studentNumber
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 100
        firstName:
          type: string
          minLength: 2
          maxLength: 50
        lastName:
          type: string
          minLength: 2
          maxLength: 50
        studentNumber:
          type: string
          minLength: 1
          maxLength: 20
        password:
          type: string
          minLength: 6
          maxLength: 100
        groupId:
          type: integer
          format: int64
          description: Optional - assign to group immediately

    CreateTeacherRequest:
      type: object
      required:
        - username
        - email
        - firstName
        - lastName
        - employeeId
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 100
        firstName:
          type: string
          minLength: 2
          maxLength: 50
        lastName:
          type: string
          minLength: 2
          maxLength: 50
        employeeId:
          type: string
          minLength: 1
          maxLength: 20
        password:
          type: string
          minLength: 6
          maxLength: 100

    UserPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer
        numberOfElements:
          type: integer
        first:
          type: boolean
        last:
          type: boolean

    UserRole:
      type: string
      enum:
        - STUDENT
        - TEACHER
        - ADMIN

    BatchUserIdsRequest:
      type: object
      required:
        - userIds
      properties:
        userIds:
          type: array
          items:
            type: integer
            format: int64
          minItems: 1
          maxItems: 100

    BatchOperationResponse:
      type: object
      properties:
        successCount:
          type: integer
          description: Number of successfully processed users
        failedCount:
          type: integer
          description: Number of failed operations
        errors:
          type: array
          items:
            type: string
          description: List of error messages for failed operations

    # Internal Security Schema (not exposed in API responses)
    UserSecurity:
      type: object
      description: Internal user representation with security-sensitive data
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
          minLength: 3
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 100
        password:
          type: string
          writeOnly: true
          description: Password hash (never returned in responses)
          minLength: 6
          maxLength: 255
        firstName:
          type: string
          minLength: 2
          maxLength: 50
        lastName:
          type: string
          minLength: 2
          maxLength: 50
        role:
          $ref: '#/components/schemas/UserRole'
        isActive:
          type: boolean
          default: true
        studentNumber:
          type: string
          maxLength: 20
          description: Student number for STUDENT role
        employeeId:
          type: string
          maxLength: 20
          description: Employee ID for TEACHER role
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    # Group Schemas
    StudentGroup:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        teachers:
          type: array
          items:
            $ref: '#/components/schemas/UserProfile'

    StudentGroupDetails:
      allOf:
        - $ref: '#/components/schemas/StudentGroup'
        - type: object
          properties:
            students:
              type: array
              items:
                $ref: '#/components/schemas/UserProfile'

    CreateGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500
        teacherIds:
          type: array
          items:
            type: integer
            format: int64
          description: IDs of teachers to assign to this group (optional)

    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500

    AddStudentRequest:
      type: object
      required:
        - studentId
      properties:
        studentId:
          type: integer
          format: int64

    AddStudentsRequest:
      type: object
      required:
        - studentIds
      properties:
        studentIds:
          type: array
          items:
            type: integer
            format: int64
          minItems: 1
          description: IDs of students to add to the group

    AddTeacherRequest:
      type: object
      required:
        - teacherId
      properties:
        teacherId:
          type: integer
          format: int64

    # Test Schemas
    Test:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        timeLimit:
          type: integer
          description: Time limit in minutes
        allowNavigation:
          type: boolean
        randomizeOrder:
          type: boolean
        createdBy:
          $ref: '#/components/schemas/UserProfile'

    TestDetails:
      allOf:
        - $ref: '#/components/schemas/Test'
        - type: object
          properties:
            assignments:
              type: array
              items:
                $ref: '#/components/schemas/Assignment'

    CreateTestRequest:
      type: object
      required:
        - title
        - startDate
        - endDate
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        timeLimit:
          type: integer
          minimum: 1
          maximum: 480
        allowNavigation:
          type: boolean
          default: true
        randomizeOrder:
          type: boolean
          default: false

    UpdateTestRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        timeLimit:
          type: integer
          minimum: 1
          maximum: 480
        allowNavigation:
          type: boolean
        randomizeOrder:
          type: boolean

    # Test Group Schemas
    TestGroupResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        studentCount:
          type: integer

    AssignGroupRequest:
      type: object
      required:
        - groupId
      properties:
        groupId:
          type: integer
          format: int64

    # Assignment Schemas
    Assignment:
      type: object
      discriminator:
        propertyName: type
      required:
        - type
        - title
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
        title:
          type: string
        description:
          type: string
        orderNumber:
          type: integer
        points:
          type: integer

    CodingAssignment:
      allOf:
        - $ref: '#/components/schemas/Assignment'
        - type: object
          properties:
            timeLimit:
              type: integer
              description: Time limit in milliseconds
            memoryLimit:
              type: integer
              description: Memory limit in MB
            allowedLanguages:
              type: array
              items:
                type: string

    CreateAssignmentRequest:
      type: object
      required:
        - type
        - title
        - points
      properties:
        type:
          type: string
          enum:
            - SINGLE_CHOICE
            - MULTIPLE_CHOICE
            - OPEN_QUESTION
            - CODING
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          maxLength: 2000
        points:
          type: number
          format: float
          minimum: 0.1
        # Single Choice / Multiple Choice fields
        options:
          type: array
          items:
            $ref: '#/components/schemas/ChoiceOptionRequest'
        randomizeOptions:
          type: boolean
          default: false
        # Multiple Choice only
        partialScoring:
          type: boolean
          default: false
        penaltyForWrong:
          type: boolean
          default: false
        # Open Question fields
        minLength:
          type: integer
          minimum: 0
        maxLength:
          type: integer
          minimum: 1
        sampleAnswer:
          type: string
        gradingRubric:
          type: string
        allowHtml:
          type: boolean
          default: false
        # Coding fields
        timeLimitMs:
          type: integer
          minimum: 100
          description: Time limit in milliseconds
        memoryLimitMb:
          type: integer
          minimum: 1
          description: Memory limit in MB
        allowedLanguages:
          type: string
          description: Comma-separated list of allowed languages
        starterCode:
          type: string
        solutionTemplate:
          type: string
        testCases:
          type: array
          items:
            $ref: '#/components/schemas/TestCaseRequest'

    UpdateAssignmentRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
        description:
          type: string
          maxLength: 2000
        points:
          type: number
          format: float
          minimum: 0.1

    MoveAssignmentRequest:
      type: object
      required:
        - newOrderNumber
      properties:
        newOrderNumber:
          type: integer
          minimum: 1

    AssignmentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
        title:
          type: string
        description:
          type: string
        orderNumber:
          type: integer
        points:
          type: number
          format: float
        isAttachmentAllowed:
          type: boolean
        # Single Choice / Multiple Choice fields
        options:
          type: array
          items:
            $ref: '#/components/schemas/ChoiceOptionResponse'
        randomizeOptions:
          type: boolean
        # Multiple Choice only
        partialScoring:
          type: boolean
        penaltyForWrong:
          type: boolean
        # Open Question fields
        minLength:
          type: integer
        maxLength:
          type: integer
        sampleAnswer:
          type: string
        gradingRubric:
          type: string
        allowHtml:
          type: boolean
        # Coding fields
        timeLimitMs:
          type: integer
        memoryLimitMb:
          type: integer
        allowedLanguages:
          type: string
        starterCode:
          type: string
        solutionTemplate:
          type: string
        testCases:
          type: array
          items:
            $ref: '#/components/schemas/TestCaseResponse'

    ChoiceOptionRequest:
      type: object
      required:
        - optionText
        - correct
      properties:
        optionText:
          type: string
          minLength: 1
        correct:
          type: boolean
        orderNumber:
          type: integer
        explanation:
          type: string

    ChoiceOptionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        optionText:
          type: string
        correct:
          type: boolean
        orderNumber:
          type: integer
        explanation:
          type: string

    TestCaseRequest:
      type: object
      required:
        - inputData
        - expectedOutput
      properties:
        inputData:
          type: string
        expectedOutput:
          type: string
        isPublic:
          type: boolean
          default: false
        description:
          type: string
        weight:
          type: integer
          default: 1

    TestCaseResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        inputData:
          type: string
        expectedOutput:
          type: string
        isPublic:
          type: boolean
        description:
          type: string
        weight:
          type: integer

    # Test Attempt Schemas
    TestAttempt:
      type: object
      properties:
        id:
          type: integer
          format: int64
        testId:
          type: integer
          format: int64
        studentId:
          type: integer
          format: int64
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        score:
          type: number
          format: float
        isCompleted:
          type: boolean

    # Answer Submission Schemas
    SubmitAnswerRequest:
      type: object
      description: Polymorphic request for submitting answers. Include fields based on assignment type.
      properties:
        # Single Choice - include selectedOptionId
        selectedOptionId:
          type: integer
          format: int64
          description: ID of the selected option (for SINGLE_CHOICE assignments)
        # Multiple Choice - include selectedOptionIds
        selectedOptionIds:
          type: array
          items:
            type: integer
            format: int64
          description: IDs of selected options (for MULTIPLE_CHOICE assignments)
        # Open Question - include answerText
        answerText:
          type: string
          maxLength: 10000
          description: Text answer (for OPEN_QUESTION assignments)
        # Coding - include sourceCode and programmingLanguage
        sourceCode:
          type: string
          maxLength: 10000
          description: Source code (for CODING assignments)
        programmingLanguage:
          type: string
          maxLength: 50
          description: Programming language (for CODING assignments)

    AnswerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        assignmentId:
          type: integer
          format: int64
        assignmentType:
          type: string
          enum:
            - SINGLE_CHOICE
            - MULTIPLE_CHOICE
            - OPEN_QUESTION
            - CODING
        answeredAt:
          type: string
          format: date-time
        # Single Choice fields
        selectedOptionId:
          type: integer
          format: int64
        # Multiple Choice fields
        selectedOptionIds:
          type: array
          items:
            type: integer
            format: int64
        # Open Question fields
        answerText:
          type: string
        wordCount:
          type: integer
        characterCount:
          type: integer
        # Coding fields
        sourceCode:
          type: string
        programmingLanguage:
          type: string
        compilationStatus:
          type: string
          enum:
            - NOT_COMPILED
            - SUCCESS
            - ERROR
            - TIMEOUT
        compilationError:
          type: string
        executionStatus:
          type: string
          enum:
            - NOT_EXECUTED
            - SUCCESS
            - RUNTIME_ERROR
            - TIME_LIMIT_EXCEEDED
            - MEMORY_LIMIT_EXCEEDED
            - SYSTEM_ERROR
        # Grading fields (may be null if not graded)
        score:
          type: number
          format: float
        isGraded:
          type: boolean
        teacherFeedback:
          type: string

    TestSubmissionResult:
      type: object
      properties:
        attemptId:
          type: integer
          format: int64
        testId:
          type: integer
          format: int64
        submittedAt:
          type: string
          format: date-time
        totalScore:
          type: number
          format: float
        maxPossibleScore:
          type: number
          format: float
        scorePercentage:
          type: number
          format: float
        gradedCount:
          type: integer
          description: Number of automatically graded assignments
        pendingGradingCount:
          type: integer
          description: Number of assignments awaiting manual grading

    TestResultResponse:
      type: object
      properties:
        attemptId:
          type: integer
          format: int64
        testId:
          type: integer
          format: int64
        testTitle:
          type: string
        studentId:
          type: integer
          format: int64
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        totalScore:
          type: number
          format: float
        maxPossibleScore:
          type: number
          format: float
        scorePercentage:
          type: number
          format: float
        isFullyGraded:
          type: boolean
          description: Whether all assignments have been graded
        assignmentResults:
          type: array
          items:
            $ref: '#/components/schemas/AssignmentResultResponse'

    AssignmentResultResponse:
      type: object
      properties:
        assignmentId:
          type: integer
          format: int64
        assignmentTitle:
          type: string
        assignmentType:
          type: string
          enum:
            - SINGLE_CHOICE
            - MULTIPLE_CHOICE
            - OPEN_QUESTION
            - CODING
        orderNumber:
          type: integer
        maxPoints:
          type: number
          format: float
        earnedScore:
          type: number
          format: float
        isCorrect:
          type: boolean
          description: For choice questions, whether the answer was correct
        isGraded:
          type: boolean
        teacherFeedback:
          type: string
        # Answer details (what the student submitted)
        answer:
          $ref: '#/components/schemas/AnswerResponse'

    # Error Schemas
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string