spring.application.name=edutest-web-server
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/edutest
spring.datasource.username=edutest
spring.datasource.password=edutest_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
# NOTE: ddl-auto=update is a transitional setting. Once V1__baseline.sql is populated
# with a real schema dump (see flyway-baseline.md), switch to validate.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway DB migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate: existing dev DBs (managed by Hibernate ddl-auto=update so far)
# get baselined to V1 on first run; only V2+ migrations are applied. Fresh DBs need
# V1__baseline.sql to be populated.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Existing schema baseline (managed by Hibernate before Flyway)
spring.flyway.validate-on-migrate=true

# JPA Configuration
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=false

# Logging Configuration
logging.level.root=INFO
logging.level.com.edutest=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=ERROR
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %-40.40logger{39} : %msg%n

# JWT Configuration
app.jwtSecret=${JWT_SECRET:eyJhbGciOiJIUzI1NiJ9.eyJSb2xlIjoiQWRtaW4iLCJJc3N1ZXIiOiJJc3N1ZXIiLCJVc2VybmFtZSI6IkphdmFJblVzZSIsImV4cCI6MTc0NjYzNDE5NiwiaWF0IjoxNzE1MDk4MTk2fQ.yrOZiRmY6Ta4H4gibhiUlzzx0wJa4h9XqMjzWcpE2Bk}
app.jwtExpirationMs=86400000

# Email / SMTP
# Set app.mail.enabled=false in dev to log emails to console instead of sending.
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:noreply@edutest.local}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:4200}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Password reset
app.password-reset.token-validity-minutes=${PASSWORD_RESET_VALIDITY_MIN:30}

# Code Execution (Docker sandbox)
coding.execution.enabled=true
coding.execution.global-timeout-ms=60000
coding.execution.default-time-ms=5000
coding.execution.default-memory-mb=256
coding.execution.output-limit-chars=2000
coding.execution.docker.host=npipe:////./pipe/docker_engine
coding.execution.docker.images-preload=python:3.12-alpine,node:20-alpine,openjdk:21-slim,gcc:13
