spring:
  datasource:
    url: jdbc:h2:mem:edutest_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  h2:
    console:
      enabled: false

# JWT Configuration for tests
app:
  jwtSecret: testSecretKeyForJwtTokenGenerationInTestsWithAtLeast256Bits1234567890
  jwtExpirationMs: 86400000
  refreshTokenExpirationMs: 604800000

# Logging
logging:
  level:
    com.edutest: DEBUG
    org.springframework.security: DEBUG
